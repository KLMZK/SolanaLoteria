<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2bee6c",
                        "background-light": "#f6f8f6",
                        "background-dark": "#102216",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .gold-gradient-text {
            background: linear-gradient(to bottom, #FFD700, #FFA500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .confetti-pattern {
            background-image: radial-gradient(circle, #2bee6c 1px, transparent 1px), radial-gradient(circle, #FFD700 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 overflow-hidden">
<!-- Background Game Screen (Dimmed/Blurred) -->
<div class="fixed inset-0 z-0 opacity-40 blur-sm pointer-events-none">
<div class="layout-container flex h-full flex-col">
<div class="px-10 lg:px-40 flex flex-1 justify-center py-5">
<div class="layout-content-container flex flex-col max-w-[960px] flex-1">
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-primary/20 px-10 py-3">
<div class="flex items-center gap-4">
<div class="size-6 text-primary">
<span class="material-symbols-outlined">token</span>
</div>
<h2 class="text-lg font-bold leading-tight tracking-[-0.015em]">Solana Lottery</h2>
</div>
<div class="flex flex-1 justify-end gap-8">
<div class="flex items-center gap-9 opacity-50">
<span class="text-sm font-medium">Home</span>
<span class="text-sm font-medium">Games</span>
<span class="text-sm font-medium">Leaderboard</span>
</div>
<button class="flex min-w-[84px] items-center justify-center rounded-lg h-10 px-4 bg-primary text-background-dark text-sm font-bold">
                                0x71C...3A2
                            </button>
</div>
</header>
<div class="grid grid-cols-3 gap-6 mt-12">
<div class="h-64 bg-primary/10 rounded-xl border border-primary/20"></div>
<div class="h-64 bg-primary/10 rounded-xl border border-primary/20"></div>
<div class="h-64 bg-primary/10 rounded-xl border border-primary/20"></div>
</div>
</div>
</div>
</div>
</div>
<!-- Victory Overlay Modal -->
<div class="fixed inset-0 z-50 flex items-center justify-center bg-background-dark/80 backdrop-blur-md">
<!-- Confetti/Particle layer -->
<div class="absolute inset-0 confetti-pattern opacity-20"></div>
<div class="relative max-w-[600px] w-full mx-4 bg-slate-900/40 border border-primary/30 rounded-3xl p-8 md:p-12 text-center shadow-[0_0_50px_rgba(43,238,108,0.2)] overflow-hidden">
<!-- Decorative Glow -->
<div class="absolute -top-24 -left-24 w-64 h-64 bg-primary/20 rounded-full blur-[80px]"></div>
<div class="absolute -bottom-24 -right-24 w-64 h-64 bg-yellow-500/10 rounded-full blur-[80px]"></div>
<!-- Icon Header -->
<div class="mb-6 inline-flex items-center justify-center w-24 h-24 rounded-full bg-primary/10 border-4 border-primary shadow-[0_0_20px_rgba(43,238,108,0.4)]">
<span class="material-symbols-outlined text-5xl text-primary" style="font-variation-settings: 'FILL' 1">emoji_events</span>
</div>
<!-- Title -->
<h1 class="gold-gradient-text text-6xl md:text-8xl font-black italic tracking-tighter mb-4">
                VICTORY!
            </h1>
<!-- Winner Content -->
<div class="space-y-4 mb-10">
<p class="text-2xl md:text-3xl font-bold text-slate-100">
<span class="text-primary">@SolanaWhale</span> has won <span class="text-yellow-400">25.5 SOL</span>
</p>
<p class="text-slate-400 text-lg max-w-md mx-auto">
                    Congratulations on your massive win! Your reward has been transferred to your connected wallet.
                </p>
</div>
<!-- Stats Grid -->
<div class="grid grid-cols-2 gap-4 mb-10">
<div class="bg-primary/5 border border-primary/10 rounded-xl p-4">
<p class="text-xs uppercase tracking-widest text-primary/60 font-bold mb-1">Total Prize</p>
<p class="text-2xl font-bold text-slate-100">25.5 SOL</p>
</div>
<div class="bg-primary/5 border border-primary/10 rounded-xl p-4">
<p class="text-xs uppercase tracking-widest text-primary/60 font-bold mb-1">Win Multiplier</p>
<p class="text-2xl font-bold text-slate-100">x42.0</p>
</div>
</div>
<!-- Actions -->
<div class="flex flex-col gap-4">
<button class="w-full py-5 bg-primary hover:bg-primary/90 text-background-dark rounded-xl font-bold text-xl transition-all shadow-[0_4px_20px_rgba(43,238,108,0.4)] flex items-center justify-center gap-2 group">
<span class="material-symbols-outlined">refresh</span>
                    Play Again
                </button>
<button class="w-full py-4 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-xl font-medium transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-sm">share</span>
                    Share Result
                </button>
</div>
<!-- Footer Decorative -->
<div class="mt-8 flex justify-center gap-4">
<div class="h-1 w-12 bg-primary/20 rounded-full"></div>
<div class="h-1 w-12 bg-primary/20 rounded-full"></div>
<div class="h-1 w-12 bg-primary/20 rounded-full"></div>
</div>
</div>
</div>
</body></html>
